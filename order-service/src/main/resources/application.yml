spring:
  config:
    import: optional:classpath:application-common.yml
  application:
    name: order-service
  kafka:
    consumer:
      group-id: order-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ticketing_orders}
    username: ${POSTGRES_USER:ticketing}
    password: ${POSTGRES_PASSWORD:ticketing_secret}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
server:
  port: 8084

reservation:
  service:
    url: ${RESERVATION_SERVICE_URL:http://localhost:8083}
