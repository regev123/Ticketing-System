apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ticketing
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ticketing/api-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CATALOG_SERVICE_URL
              value: "http://catalog-service:8081"
            - name: AVAILABILITY_SERVICE_URL
              value: "http://availability-service:8082"
            - name: RESERVATION_SERVICE_URL
              value: "http://reservation-service:8083"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8084"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8087"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ticketing
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
