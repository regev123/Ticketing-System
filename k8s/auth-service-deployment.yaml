apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ticketing
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ticketing/auth-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          env:
            - name: MONGODB_HOST
              value: "mongodb"
            - name: MONGODB_PORT
              value: "27017"
            - name: JWT_SECRET
              value: "dev-secret-change-this-key-dev-secret-change-this-key"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ticketing
spec:
  selector:
    app: auth-service
  ports:
    - port: 8087
      targetPort: 8087
